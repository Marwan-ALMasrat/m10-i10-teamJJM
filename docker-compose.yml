# Integration 10 — four-service stack.
#
# Brings up api + web + neo4j + weaviate with one command:
#   docker compose up -d --build
#
# Readiness ordering: neo4j + weaviate must be healthy before api;
# api must be healthy before web.

services:

  # ------------------------------------------------------------------
  # Neo4j — recipe knowledge graph
  # ------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      # NEO4J_AUTH is the ONLY credential env that belongs here.
      # NEO4J_USER / NEO4J_PASSWORD here would break startup — the
      # image parses every NEO4J_* key as a config namespace.
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_dbms_memory_heap_max__size: "1G"
      NEO4J_dbms_memory_pagecache_size: "512M"
    volumes:
      - neo4j_data:/data
    healthcheck:
      # cypher-shell ships in the neo4j image. Interpolation runs at
      # Compose parse time, so the resolved string is a literal by the
      # time Neo4j starts. Do NOT use $$ — that defers expansion to the
      # container shell where the vars are not exported.
      test: [ "CMD", "cypher-shell", "-u", "${NEO4J_USER}", "-p", "${NEO4J_PASSWORD}", "RETURN 1" ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  # ------------------------------------------------------------------
  # Weaviate — recipe vector index
  # ------------------------------------------------------------------
  weaviate:
    image: semitechnologies/weaviate:1.24.10
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: "20"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      # We embed externally with sentence-transformers; Weaviate must
      # not try to vectorize internally.
      DEFAULT_VECTORIZER_MODULE: "none"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      # The weaviate image ships wget, not curl. A curl-based check
      # fails silently and Weaviate never reaches healthy.
      test: [ "CMD", "wget", "--spider", "--tries=1", "http://localhost:8080/v1/.well-known/ready" ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  # ------------------------------------------------------------------
  # API — FastAPI backend
  # ------------------------------------------------------------------
  api:
    build:
      # Repo-root context so package-relative imports (from .deps import)
      # resolve when uvicorn loads `api.main:app`. `build: ./api` would
      # crash at startup with ModuleNotFoundError: No module named 'api'.
      context: .
      dockerfile: api/Dockerfile
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8000:8000"
    environment:
      # Service-name DNS — NOT localhost. Inside the Compose network the
      # api container reaches neo4j and weaviate by service name.
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      WEAVIATE_URL: "http://weaviate:8080"
      WEB_ORIGIN: "${WEB_ORIGIN}"
    depends_on:
      neo4j:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    healthcheck:
      # python:3.11-slim ships neither curl nor wget — use stdlib urllib.
      # start_period 300s covers cold HuggingFace cache (spaCy + flan-t5
      # download on first boot, up to ~4 min).
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 300s

  # ------------------------------------------------------------------
  # Web — Next.js frontend
  # ------------------------------------------------------------------
  web:
    build:
      context: ./web
      args:
        # NEXT_PUBLIC_API_URL is baked into the client bundle at BUILD
        # time. It must be host-facing (localhost) because the browser
        # on the host cannot resolve the Compose service name `api`.
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # node:20-slim ships node but not curl/wget — use Node's stdlib http.
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

# --------------------------------------------------------------------
# Named volumes — persist data across container restarts. Removed by
# `docker compose down -v` (the idempotency-check teardown).
# --------------------------------------------------------------------
volumes:
  neo4j_data:
  weaviate_data:
